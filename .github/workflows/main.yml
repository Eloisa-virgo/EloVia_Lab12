name: Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:     

env:
  REGISTRY: docker.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME:  ${{ secrets.DOCKER_HUB_USERNAME }}/personal-website
jobs:  
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/personal-website
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Copy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST_IP }}
          port: ${{ secrets.HOST_PORT || '22' }}
          username: ${{ secrets.HOST_USER_NAME }}
          key: ${{ secrets.HOST_SSH_KEY }}
          source: "docker-compose.yaml, init-db"
          target: "/root/lab12-final-project"
          strip_components: 0


      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          port: ${{ secrets.HOST_PORT || '22' }}
          username: ${{ secrets.HOST_USER_NAME }}
          key: ${{ secrets.HOST_SSH_KEY }}
          script: |
            cd /root/lab12-final-project
            docker compose down
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -af --filter "until=24h"
            
   
